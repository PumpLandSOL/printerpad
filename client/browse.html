<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browse tokens — Printer Pad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#040604;--deep:#000;--ink:#eefaf6;--sub:#9ab8b0;--mut:#5d7263;--line:rgba(238,250,240,.1);--line2:rgba(238,250,240,.2);
    --card:#0a0e0a;--card2:#101610;
    --vio:#00d6a4;--cy:#00d6a4;--pk:#7bfbe0;--amb:#7bfbe0;--grn:#00d6a4;--red:#ff5566;
    --tech:linear-gradient(135deg,#00d6a4,#4ef08a);--meme:linear-gradient(135deg,#7bfbe0,#b2ffe9)}
  html,body{background:var(--bg);color:var(--ink);font-family:'JetBrains Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased}
  .dither{position:fixed;z-index:-2;pointer-events:none;background-image:radial-gradient(circle,rgba(0,214,164,.55) 1px,transparent 1.4px);background-size:8px 8px;opacity:.3}
  .dither.d1{top:-4%;right:-6%;width:52vw;height:46vh;-webkit-mask-image:radial-gradient(60% 60% at 70% 30%,#000,transparent 72%);mask-image:radial-gradient(60% 60% at 70% 30%,#000,transparent 72%)}
  .dither.d2{bottom:-8%;left:-6%;width:44vw;height:48vh;background-image:radial-gradient(circle,rgba(238,250,240,.5) 1px,transparent 1.4px);background-size:9px 9px;opacity:.18;-webkit-mask-image:radial-gradient(55% 55% at 35% 60%,#000,transparent 70%);mask-image:radial-gradient(55% 55% at 35% 60%,#000,transparent 70%)}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  header{position:fixed;top:14px;left:0;right:0;z-index:30;pointer-events:none}
  .hrow{pointer-events:auto;display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:920px;margin:0 auto;padding:9px 12px 9px 18px;background:rgba(4,6,4,.86);backdrop-filter:blur(12px);border:1px solid var(--line2);border-radius:999px}
  .logo{display:flex;align-items:center;gap:9px;font-family:'Press Start 2P',monospace;font-size:11px}
  .logo svg{width:22px;height:22px;flex:none;image-rendering:pixelated}
  .logo b{color:var(--grn);font-weight:400}
  .hnav{display:flex;gap:6px;align-items:center}
  .btn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;border:1px solid transparent;border-radius:999px;padding:9px 16px;cursor:pointer;transition:filter .12s}
  .btn.tech{background:var(--grn);color:#03100d}
  .btn.tech:hover{filter:brightness(1.12)}
  .btn.meme{background:var(--amb);color:#031410}
  .btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--line2)}
  .btn.ghost:hover{color:var(--ink);border-color:var(--ink)}
  /* toolbar */
  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:110px 0 22px}
  h1{font:700 26px 'Inter',sans-serif;letter-spacing:-.4px;margin-right:auto;color:var(--ink)}
  h1 .c{font:400 13px 'JetBrains Mono',monospace;color:var(--mut);vertical-align:middle;margin-left:10px}
  .search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:0 16px;min-width:250px}
  .search input{border:none;outline:none;background:none;padding:11px 0;font:500 13px 'JetBrains Mono',monospace;color:var(--ink);width:100%}
  .search input::placeholder{color:var(--mut)}
  .search:focus-within{border-color:var(--grn)}
  .ftabs{display:flex;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:3px;gap:2px}
  .ftab{font:700 12px 'JetBrains Mono',monospace;color:var(--mut);border:none;background:none;border-radius:999px;padding:8px 15px;cursor:pointer}
  .ftab.on{background:var(--grn);color:#03100d}
  .ftab.on.m{background:var(--amb);color:#031410}
  select{font:700 12px 'JetBrains Mono',monospace;color:var(--ink);background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:10px 12px;outline:none;cursor:pointer}
  /* grid + cards (mirrors landing board) */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;padding-bottom:70px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
  .card:hover{border-color:rgba(0,214,164,.4)}
  .card.meme:hover{border-color:rgba(123,251,224,.4)}
  .ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .cid{display:flex;align-items:center;gap:11px}
  .cpfp{width:44px;height:44px;border-radius:11px;object-fit:cover;border:1px solid var(--line2)}
  .cname{font:700 15.5px 'Inter',sans-serif;line-height:1.15;color:var(--ink)}
  .ctk{font:500 12px 'JetBrains Mono',monospace;color:var(--grn)}
  .card.meme .ctk{color:var(--amb)}
  .badge{flex:none;text-align:center;border-radius:11px;padding:6px 10px;border:1px solid var(--line);min-width:60px;background:var(--card2)}
  .badge .s{font:500 19px 'JetBrains Mono',monospace;line-height:1}
  .badge .l{font:500 7.5px 'JetBrains Mono',monospace;color:var(--mut);letter-spacing:.12em;margin-top:3px}
  .badge.meme{background:var(--amb);border:none}
  .badge.meme .s,.badge.meme .l{color:#031410}
  .badge.meme .s{font-size:16px}
  .cdesc{color:var(--sub);font:400 12.5px 'JetBrains Mono',monospace;line-height:1.6;min-height:20px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font:500 10.5px 'JetBrains Mono',monospace;color:var(--mut);background:var(--deep);border:1px solid var(--line);border-radius:7px;padding:3px 8px}
  .chip.ok{color:var(--grn);border-color:rgba(0,214,164,.3)}
  .chip.memec{color:var(--amb);border-color:rgba(123,251,224,.3)}
  .clinks{display:flex;gap:8px;margin-top:2px;border-top:1px solid var(--line);padding-top:10px}
  .clink{flex:1;text-align:center;font:500 11px 'JetBrains Mono',monospace;color:var(--sub);background:var(--deep);border:1px solid var(--line);border-radius:9px;padding:7px}
  .clink:hover{border-color:var(--grn);color:var(--grn)}
  .empty{grid-column:1/-1;text-align:center;color:var(--mut);padding:60px 20px;border:1px dashed var(--line2);border-radius:16px;font:400 13px 'JetBrains Mono',monospace;line-height:1.8}
  .empty b{color:var(--ink)}
  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--mut);font:400 11.5px 'JetBrains Mono',monospace;text-align:center}
</style>
</head>
<body>
<div class="dither d1"></div><div class="dither d2"></div>
<header><div class="hrow">
  <a class="logo" href="/">
    <svg viewBox="0 0 24 24" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg"><g fill="#00d6a4"><rect x="1" y="6" width="22" height="2"/><rect x="1" y="16" width="22" height="2"/><rect x="1" y="8" width="2" height="8"/><rect x="21" y="8" width="2" height="8"/><rect x="10" y="9" width="4" height="2"/><rect x="9" y="11" width="3" height="2"/><rect x="12" y="11" width="3" height="2"/><rect x="10" y="13" width="4" height="2"/><rect x="4" y="11" width="2" height="2"/><rect x="18" y="11" width="2" height="2"/></g></svg>
    PRINTER<b>PAD</b>
  </a>
  <div class="hnav">
    <a class="btn ghost" href="/">← Home</a>
    <button class="btn tech" onclick="location.href='/#launch'">Launch Tech</button>
    <button class="btn meme" onclick="location.href='/#launch'">Launch Meme</button>
  </div>
</div></header>

<div class="wrap">
  <div class="bar">
    <h1>Browse tokens<span class="c" id="count">—</span></h1>
    <div class="search"><span>🔍</span><input id="q" type="text" placeholder="search name or ticker…"></div>
    <div class="ftabs">
      <button class="ftab on" data-kind="all">All</button>
      <button class="ftab" data-kind="tech">Tech</button>
      <button class="ftab m" data-kind="meme">Memes</button>
    </div>
    <select id="sort">
      <option value="new">Newest</option>
      <option value="old">Oldest</option>
      <option value="score">Top Tech Score</option>
      <option value="votes">Most votes</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
</div>

<footer>Printer Pad · printerpad.fun · $PRINT — rewards &amp; staking are a simulated off-chain ledger, no custody, no promised yield</footer>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? '' : s).replace(/[<>&"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]));
  const host = (u) => { try { return new URL(u).host.replace(/^www\./, ''); } catch (e) { return u; } };
  const ago = (t) => { const s = (Date.now() - t) / 1000; if (s < 60) return 'just now'; if (s < 3600) return (s / 60 | 0) + 'm ago'; if (s < 86400) return (s / 3600 | 0) + 'h ago'; return (s / 86400 | 0) + 'd ago'; };
  const scoreColor = (s) => s >= 80 ? '#00d6a4' : s >= 60 ? '#8fe06a' : s >= 40 ? '#ffd75e' : '#ff5566';

  let ALL = [], q = '', kind = 'all', sort = 'new';

  function card(p) {
    const isMeme = p.kind === 'meme';
    const badge = isMeme
      ? '<div class="badge meme"><div class="s">🎭</div><div class="l">MEME</div></div>'
      : '<div class="badge" style="border-color:' + scoreColor(p.score) + '55"><div class="s" style="color:' + scoreColor(p.score) + '">' + p.score + '</div><div class="l">TECH</div></div>';
    const idBlock = (isMeme && p.pfp ? '<img class="cpfp" src="' + esc(p.pfp) + '" alt="" loading="lazy">' : '');
    const chips = [];
    if (isMeme) { chips.push('<span class="chip memec">🎭 MEME</span>', '<span class="chip ok">PFP ✓ original</span>'); }
    else { if (p.lang) chips.push('<span class="chip ok">' + esc(p.lang) + '</span>'); chips.push('<span class="chip">★ ' + (p.stars || 0) + '</span>'); }
    if (p.ca) chips.push('<span class="chip ok">CA ✓</span>');
    if (p.mult > 1) chips.push('<span class="chip ok">' + p.mult + '× rewards</span>');
    chips.push('<span class="chip">' + ago(p.spawnedAt) + '</span>');
    chips.push('<span class="chip">▲ ' + (p.votes || 0) + '</span>');
    const links = isMeme ? '' :
      '<div class="clinks">' +
        '<a class="clink" href="' + esc(p.website) + '" target="_blank" rel="noopener">site ↗ ' + esc(host(p.website)) + '</a>' +
        '<a class="clink" href="' + esc(p.github) + '" target="_blank" rel="noopener">github ↗</a>' +
      '</div>';
    return '<div class="card' + (isMeme ? ' meme' : '') + '">' +
      '<div class="ctop"><div class="cid">' + idBlock + '<div><div class="cname">' + esc(p.name) + '</div><div class="ctk">$' + esc(p.ticker) + '</div></div></div>' + badge + '</div>' +
      '<div class="cdesc">' + (esc(p.desc) || '') + '</div>' +
      '<div class="chips">' + chips.join('') + '</div>' + links + '</div>';
  }

  function render() {
    let list = ALL.slice();
    if (kind !== 'all') list = list.filter((p) => (p.kind === 'meme' ? 'meme' : 'tech') === kind);
    if (q) { const s = q.toLowerCase().replace(/^\$/, ''); list = list.filter((p) => p.name.toLowerCase().includes(s) || p.ticker.toLowerCase().includes(s)); }
    if (sort === 'new') list.sort((a, b) => b.spawnedAt - a.spawnedAt);
    if (sort === 'old') list.sort((a, b) => a.spawnedAt - b.spawnedAt);
    if (sort === 'score') list.sort((a, b) => (b.score ?? -1) - (a.score ?? -1));
    if (sort === 'votes') list.sort((a, b) => (b.votes || 0) - (a.votes || 0));
    $('count').textContent = list.length + ' of ' + ALL.length + ' token' + (ALL.length === 1 ? '' : 's');
    $('grid').innerHTML = list.length ? list.map(card).join('')
      : '<div class="empty"><b>Nothing here yet.</b><br>' + (ALL.length ? 'No tokens match that filter — clear the search or switch tabs.' : 'Be the first — launch tech or a meme from the <a href="/" style="color:var(--grn);font-weight:700">home page</a>.') + '</div>';
  }

  async function load() {
    try { const d = await (await fetch('/api/projects')).json(); ALL = d.projects || []; render(); }
    catch (e) { $('grid').innerHTML = '<div class="empty">Failed to load — refresh.</div>'; }
  }

  $('q').addEventListener('input', () => { q = $('q').value.trim(); render(); });
  document.querySelectorAll('.ftab').forEach((b) => b.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach((x) => x.classList.toggle('on', x === b));
    kind = b.dataset.kind; render();
  }));
  $('sort').addEventListener('change', () => { sort = $('sort').value; render(); });

  load(); setInterval(load, 15000);
})();
</script>
</body>
</html>
