<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{--bg:#000;--ink:#fff;--sub:#a6a6a6;--mut:#6a6a6a;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.24);
  --card:#0a0a0a;--card2:#121212}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'JetBrains Mono',ui-monospace,monospace;color:var(--ink);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
.stage{position:relative;overflow:hidden;background:var(--bg)}
.px{font-family:'Press Start 2P',monospace;font-weight:400}
.dither{position:absolute;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.4) 1px,transparent 1.4px);background-size:9px 9px;opacity:.16}

  .stage{width:3000px;height:1000px}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:52px}
  .tag{font-family:'Inter';font-weight:600;font-size:42px;color:var(--sub);max-width:2100px;text-align:center}
  .tag b{color:var(--ink)}
  .row{display:flex;gap:22px}</style></head>

     <div class="tag">The <b>FIRST launchpad on Stable</b> — Tether&rsquo;s USDT chain. Launch tech, launch memes, get paid in dollars. <b>$PRINT powers the pad.</b></div>
     <div class="row"><span style="display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:25px;font-weight:700;color:#000;background:#fff;border:1px solid #fff;border-radius:999px;padding:13px 28px;letter-spacing:.04em">FIRST ON STABLE CHAIN</span><span style="display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:25px;font-weight:700;color:var(--ink);background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:13px 28px;letter-spacing:.04em">USDT0 GAS · DOLLAR RAILS</span><span style="display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:25px;font-weight:700;color:#000;background:#fff;border:1px solid #fff;border-radius:999px;padding:13px 28px;letter-spacing:.04em">$PRINT</span></div>
     <div style="font-size:30px;color:var(--mut);letter-spacing:2px;font-weight:700">printerpad.fun · @PrinterPadSTBL · CHAIN ID 988</div>
